<!DOCTYPE html>
<html>

<head>
    <title>My First Blog with Django Girls tutorial</title>
</head>

<body>
    <header>
        <h1><a href="/">My First Blog</a></h1>
    </header>

    <h1>My Blog</h1>
    <p>Here is where I will write my blog posts.</p>

    {% for post in posts %}
    <article>
        <time>published: {{ post.published_date }}</time>
        <h2><a href="">{{post.title}}</a></h2>
        <p>{{ post.text|linebreaksbr }}</p>
    </article>
    {% endfor %}

</body>

</html>
